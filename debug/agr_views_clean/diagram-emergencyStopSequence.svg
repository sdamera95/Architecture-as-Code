    ><text x="0" xml:space="preserve" y="11.5" style="stroke:none;"
      >Emergency stop protocol modeled as an interaction sequence.</text
      ><text x="0" xml:space="preserve" y="37.5" style="stroke:none;"
      >Uses 'occurrence' container (not part def) so Syside Modeler</text
      ><text x="0" xml:space="preserve" y="50.5" style="stroke:none;"
      >renders this as a sequence diagram with lifelines and message arrows.</text
      ><text x="0" xml:space="preserve" y="76.5" style="stroke:none;"
      >Shows the inter-participant message exchange when an operator</text
      ><text x="0" xml:space="preserve" y="89.5" style="stroke:none;"
      >triggers an emergency stop. Includes both synchronous</text
      ><text x="0" xml:space="preserve" y="102.5" style="stroke:none;"
      >(request-response with ordered occurrences) and asynchronous</text
      ><text x="0" xml:space="preserve" y="115.5" style="stroke:none;"
      >(fire-and-forget) message flows across 5 participants.</text
      ><text x="0" xml:space="preserve" y="141.5" style="stroke:none;"
      >Lifelines: operator, baseStation, coordinator, tracker, guard</text
    ></g
